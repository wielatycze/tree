name: Export data

on:
  push:
    paths:
      - 'data/tree.sqlite3'
      - 'export.py'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run export script
        run: python export.py
        env:
          DB_PATH: data/tree.sqlite3
          OUT_DIR: data
      - name: Commit exported JSON files
        uses: EndBug/add-and-commit@v10
        with:
          author_name: GitHub Actions
          author_email: actions@github.com
          message: 'Auto-update exported JSON data'
          add: 'data/*.json'
          default_author: github_actions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
