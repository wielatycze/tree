<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Велятичи — Family Tree</title>
  <link rel="stylesheet" href="tree.css">
</head>
<body>

  <div id="loading">
    <div id="loading-bar"><div id="loading-fill" style="width:0%"></div></div>
    <p id="loading-msg">Loading family tree data...</p>
  </div>

  <div id="err" style="display:none">
    <h2>Could not load data</h2>
    <p id="err-msg"></p>
  </div>

  <div id="toolbar">
    <h1>Велятичи</h1>
    <div id="search-wrap">
      <input id="search-input" placeholder="Search name..." autocomplete="off">
      <div id="search-results" style="display:none"></div>
    </div>
    <button class="btn" id="btn-home">Home</button>
    <span id="crumb"></span>
  </div>

  <div id="canvas-wrap">
    <div id="canvas"></div>
  </div>

  <div id="detail-panel" style="display:none">
    <div id="detail-body">
      <div id="detail-name"></div>
      <div id="detail-info"></div>
      <div id="detail-nav"></div>
    </div>
    <span id="detail-close">×</span>
  </div>

  <script src="tree.js"></script>
</body>
</html>
